<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>通知中心 | 我的个人主页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --primary-hover: #3a56d4;
            --secondary: #f72585;
            --secondary-hover: #e5177b;
            --tertiary: #7209b7;
            --tertiary-hover: #5a08a0;
            --dark: #2b2d42;
            --light: #f8f9fa;
            --gray: #6c757d;
            --success: #4cc9f0;
            --success-hover: #3daeda;
            --danger: #f48c06;
            --danger-hover: #e07e05;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background-color: #f0f2f5;
            color: var(--dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255,255,255,0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255,255,255,0.1) 0%, transparent 20%);
            animation: gradientShift 15s ease infinite;
            background-size: 200% 200%;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }
        
        .container {
            max-width: 900px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }
        
        h1 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5rem;
            position: relative;
            display: inline-block;
            width: 100%;
        }
        
        h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 2px;
        }
        
        h2 {
            color: var(--primary);
            margin: 30px 0 20px;
            font-size: 1.5rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        
        /* 通知列表样式 */
        .notifications-list {
            margin: 20px 0;
        }
        
        .notification-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            border-left: 4px solid var(--primary);
            transition: transform 0.3s ease;
        }
        
        .notification-item:hover {
            transform: translateY(-3px);
        }
        
        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .notification-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--dark);
        }
        
        .notification-time {
            font-size: 0.85rem;
            color: var(--gray);
        }
        
        .notification-content {
            color: var(--dark);
            line-height: 1.8;
            margin-bottom: 10px;
            white-space: pre-wrap; /* 保留换行 */
        }
        
        .notification-actions {
            text-align: right;
        }
        
        .delete-btn {
            color: var(--danger);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            transition: color 0.3s ease;
        }
        
        .delete-btn:hover {
            color: var(--danger-hover);
        }
        
        .delete-btn i {
            margin-right: 5px;
        }
        
        /* 新建通知表单样式 */
        .new-notification-form {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            margin-top: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
        }
        
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }
        
        textarea {
            min-height: 150px;
            resize: vertical;
            line-height: 1.6;
        }
        
        /* 按钮样式 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 28px;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(255,255,255,0.2), rgba(255,255,255,0));
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .btn:hover::before {
            opacity: 1;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 14px rgba(0, 0, 0, 0.15);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        .btn-primary {
            background-color: var(--primary);
        }
        
        .btn-primary:hover {
            background-color: var(--primary-hover);
        }
        
        .btn-success {
            background-color: var(--success);
        }
        
        .btn-success:hover {
            background-color: var(--success-hover);
        }
        
        .action-buttons {
            text-align: right;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        
        .back-link:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }
        
        .back-link i {
            margin-right: 8px;
        }
        
        /* 空状态提示 */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--gray);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #ddd;
        }
        
        /* 提示消息样式 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            display: flex;
            align-items: center;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.3s ease;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }
        
        .toast-success {
            border-left: 4px solid var(--success);
        }
        
        .toast-error {
            border-left: 4px solid var(--danger);
        }
        
        .toast-info {
            border-left: 4px solid var(--primary);
        }
        
        .toast i {
            margin-right: 10px;
            font-size: 1.2rem;
        }
        
        .toast-success i {
            color: var(--success);
        }
        
        .toast-error i {
            color: var(--danger);
        }
        
        .toast-info i {
            color: var(--primary);
        }
        
        /* 加载中样式 */
        .loading {
            text-align: center;
            padding: 30px;
            color: var(--gray);
        }
        
        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .container {
                margin: 20px;
                padding: 25px;
            }
            
            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
            
            .notification-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .notification-time {
                margin-top: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>通知中心</h1>
        
        <!-- 通知列表区域 -->
        <h2><i class="fas fa-bell"></i> 最新通知</h2>
        <div id="notificationsList" class="notifications-list">
            <div class="loading">
                <i class="fas fa-spinner"></i>
                <p>加载通知中...</p>
            </div>
        </div>
        
        <!-- 新建通知区域 -->
        <h2><i class="fas fa-plus-circle"></i> 发布新通知</h2>
        <div class="new-notification-form" id="publishForm" style="display: none;">
            <div class="form-group">
                <label for="notificationTitle">通知标题</label>
                <input type="text" id="notificationTitle" placeholder="请输入通知标题（必填）">
            </div>
            <div class="form-group">
                <label for="notificationContent">通知内容</label>
                <textarea id="notificationContent" placeholder="请输入通知正文，可以换行"></textarea>
            </div>
            <div class="action-buttons">
                <button id="publishBtn" class="btn btn-success">
                    <i class="fas fa-paper-plane"></i> 发布通知
                </button>
            </div>
        </div>
        
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> 返回个人主页
        </a>
    </div>
    
    <!-- 提示消息组件 -->
    <div id="toast" class="toast">
        <i id="toastIcon" class="fas"></i>
        <span id="toastMessage"></span>
    </div>

    <script>
        // ======================== 配置区域（仅改这4处） ========================
        const GITHUB_USERNAME = 'sss31444';  // 你的GitHub用户名（不用改）
        let GITHUB_TOKEN = '';               // 空着，手动输入
        let GIST_ID = '';                    // 首次发布后填，先空着
        const ADMIN_PASSWORD = 'ideapady450tsixp';  // 你的管理员密码（改成自己的）
        // =====================================================================

        let isAdmin = false;
        const gistFilename = 'notifications.json';
        let gistRawUrl = '';

        // DOM元素
        const notificationsList = document.getElementById('notificationsList');
        const notificationTitle = document.getElementById('notificationTitle');
        const notificationContent = document.getElementById('notificationContent');
        const publishBtn = document.getElementById('publishBtn');
        const publishForm = document.getElementById('publishForm');
        const toast = document.getElementById('toast');
        const toastIcon = document.getElementById('toastIcon');
        const toastMessage = document.getElementById('toastMessage');
        
        // 页面加载：先弹密码框，再加载通知（核心修复）
        document.addEventListener('DOMContentLoaded', async function() {
            // 页面动画
            const container = document.querySelector('.container');
            container.style.opacity = '0';
            container.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                container.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 100);
            
            // 第一步：先验证管理员（必弹密码框）
            await checkAdminStatus();
            
            // 第二步：再加载通知（不管是不是管理员都加载）
            await loadNotifications();
        });

        // 管理员验证（强制弹窗，确保执行）
        function checkAdminStatus() {
            return new Promise((resolve) => {
                // 强制弹窗输入密码，直到取消或输入
                const userPassword = prompt("请输入管理员密码以发布/删除通知：");
                
                if (userPassword === ADMIN_PASSWORD) {
                    isAdmin = true;
                    // 管理员验证通过，弹窗要Token
                    GITHUB_TOKEN = prompt("请输入GitHub Gist Token（ghp开头）：");
                    if (!GITHUB_TOKEN) {
                        showToast('提示', '未输入Token，仅能查看通知', 'info');
                    }
                    // 显示发布表单
                    publishForm.style.display = 'block';
                    showToast('验证成功', '你可以发布/删除通知', 'success');
                } else {
                    isAdmin = false;
                    // 非管理员隐藏发布表单
                    publishForm.style.display = 'none';
                    showToast('访客模式', '你只能查看通知', 'info');
                }
                resolve(); // 不管结果如何，都继续执行后续逻辑
            });
        }

        // 加载通知（兼容无Gist、加载失败的情况）
        async function loadNotifications() {
            try {
                // 情况1：有GIST_ID，尝试加载
                if (GIST_ID) {
                    gistRawUrl = `https://gist.githubusercontent.com/${GITHUB_USERNAME}/${GIST_ID}/raw/${gistFilename}`;
                    const response = await fetch(gistRawUrl, {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json'
                        },
                        timeout: 10000 // 10秒超时
                    });

                    if (!response.ok) throw new Error('Gist加载失败');
                    
                    const notifications = await response.json();
                    // 按时间倒序排序
                    notifications.sort((a, b) => new Date(b.time) - new Date(a.time));
                    
                    renderNotifications(notifications);
                } 
                // 情况2：无GIST_ID（首次使用）
                else {
                    notificationsList.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>暂无通知</p>
                            ${isAdmin ? '<p style="margin-top:10px;">管理员可发布第一条通知</p>' : ''}
                        </div>
                    `;
                }
            } 
            // 所有错误都显示空状态+提示
            catch (error) {
                console.log('加载通知失败：', error);
                notificationsList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>暂无通知或加载失败</p>
                        ${isAdmin ? '<p style="margin-top:10px;">请发布第一条通知</p>' : ''}
                    </div>
                `;
                showToast('提示', '首次使用请发布第一条通知', 'info');
            }
        }

        // 渲染通知列表
        function renderNotifications(notifications) {
            if (!notifications || notifications.length === 0) {
                notificationsList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>暂无通知</p>
                        ${isAdmin ? '<p style="margin-top:10px;">管理员可发布第一条通知</p>' : ''}
                    </div>
                `;
                return;
            }
            
            notificationsList.innerHTML = notifications.map((notification, index) => `
                <div class="notification-item">
                    <div class="notification-header">
                        <div class="notification-title">${escapeHtml(notification.title)}</div>
                        <div class="notification-time">${formatTime(notification.time)}</div>
                    </div>
                    <div class="notification-content">${escapeHtml(notification.content)}</div>
                    ${isAdmin ? `
                        <div class="notification-actions">
                            <button class="delete-btn" onclick="deleteNotification(${index})">
                                <i class="fas fa-trash"></i> 删除
                            </button>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // 发布通知（核心逻辑）
        publishBtn.addEventListener('click', async function() {
            if (!isAdmin) {
                showToast('权限不足', '只有管理员可以发布通知', 'error');
                return;
            }

            const title = notificationTitle.value.trim();
            const content = notificationContent.value.trim();
            
            if (!title) {
                showToast('错误', '通知标题不能为空！', 'error');
                return;
            }
            
            if (!GITHUB_TOKEN) {
                showToast('错误', '请先输入GitHub Token！', 'error');
                return;
            }

            // 组装新通知
            const newNotification = {
                title: title,
                content: content,
                time: new Date().toISOString()
            };

            try {
                // 情况1：已有GIST_ID，更新
                if (GIST_ID) {
                    // 先获取现有通知
                    const response = await fetch(gistRawUrl);
                    let existingNotifications = [];
                    if (response.ok) {
                        existingNotifications = await response.json();
                    }
                    // 添加新通知
                    existingNotifications.push(newNotification);
                    // 更新Gist
                    await updateGist(existingNotifications);
                } 
                // 情况2：无GIST_ID，创建新Gist
                else {
                    const gistData = await createGist([newNotification]);
                    GIST_ID = gistData.id;
                    showToast('成功', `Gist创建成功，ID：${GIST_ID}（请复制到代码的GIST_ID中）`, 'success');
                }

                // 清空表单+重新加载
                notificationTitle.value = '';
                notificationContent.value = '';
                await loadNotifications();
                showToast('成功', '通知发布成功！所有访客都能看到', 'success');

            } catch (error) {
                showToast('发布失败', '错误：' + error.message, 'error');
                console.log('发布失败：', error);
            }
        });

        // 删除通知
        async function deleteNotification(index) {
            if (!isAdmin || !GITHUB_TOKEN || !GIST_ID) return;
            
            if (confirm('确定要删除这条通知吗？')) {
                try {
                    // 获取现有通知
                    const response = await fetch(gistRawUrl);
                    if (!response.ok) throw new Error('获取通知失败');
                    
                    let notifications = await response.json();
                    // 删除指定索引的通知
                    notifications.splice(index, 1);
                    // 更新Gist
                    await updateGist(notifications);
                    // 重新加载
                    await loadNotifications();
                    showToast('成功', '通知已删除！', 'success');

                } catch (error) {
                    showToast('删除失败', '错误：' + error.message, 'error');
                }
            }
        }

        // 创建新Gist
        async function createGist(notifications) {
            const response = await fetch('https://api.github.com/gists', {
                method: 'POST',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    description: 'Notifications data for personal page',
                    public: true,
                    files: {
                        [gistFilename]: {
                            content: JSON.stringify(notifications, null, 2)
                        }
                    }
                })
            });

            if (!response.ok) throw new Error(`创建Gist失败：${response.statusText}`);
            return await response.json();
        }

        // 更新现有Gist
        async function updateGist(notifications) {
            const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    files: {
                        [gistFilename]: {
                            content: JSON.stringify(notifications, null, 2)
                        }
                    }
                })
            });

            if (!response.ok) throw new Error(`更新Gist失败：${response.statusText}`);
            return await response.json();
        }

        // 辅助函数：时间格式化
        function formatTime(timeString) {
            const date = new Date(timeString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }
        
        // 辅助函数：HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
        
        // 辅助函数：显示提示
        function showToast(title, message, type) {
            toast.className = 'toast';
            toast.classList.add(`toast-${type}`);
            
            if (type === 'success') {
                toastIcon.className = 'fas fa-check-circle';
            } else if (type === 'error') {
                toastIcon.className = 'fas fa-exclamation-circle';
            } else if (type === 'info') {
                toastIcon.className = 'fas fa-info-circle';
            }
            
            toastMessage.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 扩展：添加fetch超时
        const originalFetch = window.fetch;
        window.fetch = function(resource, options = {}) {
            const timeout = options.timeout || 10000;
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            return originalFetch(resource, {
                ...options,
                signal: controller.signal
            }).finally(() => clearTimeout(id));
        };
    </script>
</body>
</html>
