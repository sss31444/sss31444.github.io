<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>通知中心 | 我的个人主页</title>
    <!-- 外部依赖 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.css">
    <script src="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.js"></script>
    <style>
        :root {
            /* 亮色主题变量 */
            --primary: #4361ee;
            --primary-hover: #3a56d4;
            --secondary: #f72585;
            --secondary-hover: #e5177b;
            --tertiary: #7209b7;
            --tertiary-hover: #5a08a0;
            --dark: #2b2d42;
            --light: #f8f9fa;
            --gray: #6c757d;
            --gray-light: #e9ecef;
            --gray-dark: #495057;
            --success: #4cc9f0;
            --success-hover: #3daeda;
            --danger: #f48c06;
            --danger-hover: #e07e05;
            --warning: #ffb703;
            --info: #3a86ff;
            --bg-primary: #ffffff;
            --bg-secondary: #f0f2f5;
            --border-color: #ddd;
            --text-primary: #2b2d42;
            --text-secondary: #6c757d;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            /* 暗黑主题变量 */
            --primary: #7b8ff8;
            --primary-hover: #6a7ef0;
            --secondary: #ff5e8f;
            --secondary-hover: #ff457a;
            --tertiary: #9d4edd;
            --tertiary-hover: #8b3ed6;
            --dark: #f8f9fa;
            --light: #2b2d42;
            --gray: #adb5bd;
            --gray-light: #495057;
            --gray-dark: #e9ecef;
            --success: #5eead4;
            --success-hover: #4cd8c3;
            --danger: #fb923c;
            --danger-hover: #f97316;
            --warning: #fbbf24;
            --info: #60a5fa;
            --bg-primary: #1a1b26;
            --bg-secondary: #242535;
            --border-color: #374151;
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255,255,255,0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255,255,255,0.05) 0%, transparent 20%);
            animation: gradientShift 15s ease infinite;
            background-size: 200% 200%;
            transition: var(--transition);
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }
        
        .container {
            max-width: 900px;
            margin: 40px auto;
            background: var(--bg-primary);
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(5px);
            border: 1px solid var(--border-color);
            transform: translateY(0);
            transition: var(--transition);
        }
        
        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }
        
        h1 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5rem;
            position: relative;
            display: inline-block;
            width: 100%;
            transition: var(--transition);
        }
        
        h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 2px;
        }
        
        h2 {
            color: var(--primary);
            margin: 30px 0 20px;
            font-size: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            transition: var(--transition);
        }

        /* 主题切换按钮 */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-primary);
            color: var(--primary);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            z-index: 999;
            transition: var(--transition);
        }

        .theme-toggle:hover {
            background: var(--primary);
            color: var(--light);
        }

        /* 搜索栏样式 */
        .search-bar {
            margin: 20px 0;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        /* 标签筛选栏 */
        .tag-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }

        .tag-btn {
            padding: 6px 15px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .tag-btn.active {
            background: var(--primary);
            color: var(--light);
            border-color: var(--primary);
        }

        .tag-btn:hover:not(.active) {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* 批量操作栏 */
        .batch-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            padding: 10px;
            background: var(--bg-secondary);
            border-radius: 8px;
        }

        .batch-select {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .batch-select input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .batch-btn {
            padding: 6px 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .batch-delete {
            background: var(--danger);
            color: var(--light);
        }

        .batch-delete:hover {
            background: var(--danger-hover);
        }

        .import-export {
            display: flex;
            gap: 10px;
        }

        .import-btn, .export-btn {
            background: var(--info);
            color: var(--light);
        }

        .import-btn:hover, .export-btn:hover {
            background: var(--primary);
        }

        /* 通知列表样式（仅显示标题） */
        .notifications-list {
            margin: 20px 0;
        }
        
        .notification-item {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
            border-left: 4px solid var(--primary);
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid var(--border-color);
        }

        .notification-item.unread {
            background: rgba(67, 97, 238, 0.05);
            border-left-color: var(--info);
        }
        
        .notification-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            background-color: var(--bg-secondary);
        }

        .notification-item.top {
            border-left-color: var(--warning);
            position: relative;
        }

        .notification-item.top::after {
            content: '置顶';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 0.7rem;
            padding: 2px 8px;
            background: var(--warning);
            color: var(--light);
            border-radius: 4px;
        }
        
        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        
        .notification-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
            text-decoration: none;
            transition: var(--transition);
        }

        .notification-item.unread .notification-title {
            font-weight: 700;
        }

        .notification-tag {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 10px;
            background: var(--gray-light);
            color: var(--light);
        }

        .tag-info { background: var(--info); }
        .tag-warning { background: var(--warning); }
        .tag-success { background: var(--success); }
        .tag-danger { background: var(--danger); }
        
        .notification-time {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        /* 详情页样式 */
        .detail-container {
            max-width: 700px;
            margin: 40px auto;
            background: var(--bg-primary);
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: none;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }
        
        .detail-title {
            font-size: 1.8rem;
            color: var(--text-primary);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition);
        }
        
        .detail-time {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-tag {
            display: inline-block;
            font-size: 0.8rem;
            padding: 3px 10px;
            border-radius: 4px;
            background: var(--gray-light);
            color: var(--light);
        }
        
        .detail-content {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text-primary);
            white-space: pre-wrap;
            transition: var(--transition);
        }

        .detail-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 10px 0;
        }

        .detail-content a {
            color: var(--primary);
            text-decoration: none;
        }

        .detail-content a:hover {
            text-decoration: underline;
        }
        
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 20px;
            background-color: var(--primary);
            color: var(--light);
            border-radius: 8px;
            text-decoration: none;
            transition: var(--transition);
        }
        
        .back-btn:hover {
            background-color: var(--primary-hover);
        }
        
        .notification-actions {
            text-align: right;
            margin-top: 5px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        .edit-btn, .delete-btn, .top-btn {
            color: var(--primary);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            transition: var(--transition);
            padding: 5px 10px;
            border-radius: 4px;
        }
        
        .edit-btn:hover {
            color: var(--info);
            background: rgba(58, 134, 255, 0.1);
        }

        .delete-btn:hover {
            color: var(--danger);
            background: rgba(244, 140, 6, 0.1);
        }

        .top-btn:hover {
            color: var(--warning);
            background: rgba(255, 183, 3, 0.1);
        }
        
        .edit-btn i, .delete-btn i, .top-btn i {
            margin-right: 5px;
        }

        .delete-btn { color: var(--danger); }
        .top-btn { color: var(--warning); }
        
        /* 新建/编辑通知表单样式 */
        .new-notification-form {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 25px;
            box-shadow: var(--shadow);
            margin-top: 30px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
            flex: 1;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
            transition: var(--transition);
        }
        
        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }
        
        textarea {
            min-height: 150px;
            resize: vertical;
            line-height: 1.6;
        }
        
        /* 按钮样式 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 28px;
            color: var(--light);
            text-decoration: none;
            border-radius: 50px;
            transition: var(--transition);
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(255,255,255,0.2), rgba(255,255,255,0));
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .btn:hover::before {
            opacity: 1;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 14px rgba(0, 0, 0, 0.15);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        .btn-primary {
            background-color: var(--primary);
        }
        
        .btn-primary:hover {
            background-color: var(--primary-hover);
        }
        
        .btn-success {
            background-color: var(--success);
        }
        
        .btn-success:hover {
            background-color: var(--success-hover);
        }

        .btn-warning {
            background-color: var(--warning);
        }
        
        .btn-warning:hover {
            background-color: #eaa300;
        }
        
        .action-buttons {
            text-align: right;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }
        
        .back-link:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }
        
        .back-link i {
            margin-right: 8px;
        }
        
        /* 空状态提示 */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-secondary);
            transition: var(--transition);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: var(--gray-light);
        }

        /* 骨架屏样式 */
        .skeleton {
            background: linear-gradient(90deg, var(--gray-light) 25%, var(--border-color) 50%, var(--gray-light) 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-item {
            padding: 20px;
            margin-bottom: 10px;
            border-radius: 12px;
        }

        .skeleton-title {
            height: 24px;
            width: 60%;
            margin-bottom: 10px;
        }

        .skeleton-time {
            height: 16px;
            width: 30%;
        }
        
        /* 提示消息样式 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: var(--bg-primary);
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            display: flex;
            align-items: center;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.3s ease;
            border-left: 4px solid var(--primary);
            border: 1px solid var(--border-color);
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }
        
        .toast-success {
            border-left: 4px solid var(--success);
        }
        
        .toast-error {
            border-left: 4px solid var(--danger);
        }
        
        .toast-info {
            border-left: 4px solid var(--primary);
        }
        
        .toast i {
            margin-right: 10px;
            font-size: 1.2rem;
        }
        
        .toast-success i {
            color: var(--success);
        }
        
        .toast-error i {
            color: var(--danger);
        }
        
        .toast-info i {
            color: var(--primary);
        }
        
        /* 加载中样式 */
        .loading {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            transition: var(--transition);
        }
        
        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 移动端悬浮按钮 */
        .fab-button {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary);
            color: var(--light);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: var(--shadow);
            align-items: center;
            justify-content: center;
            z-index: 998;
            transition: var(--transition);
        }

        .fab-button:hover {
            background: var(--primary-hover);
            transform: scale(1.1);
        }
        
        @media (max-width: 768px) {
            .container {
                margin: 20px;
                padding: 25px;
            }
            
            .detail-container {
                margin: 20px;
                padding: 20px;
            }
            
            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
            
            .notification-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
            
            .notification-time {
                margin-top: 0;
            }

            .form-row {
                flex-direction: column;
                gap: 0;
            }

            .batch-actions {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .import-export {
                width: 100%;
                justify-content: flex-start;
            }

            .fab-button {
                display: flex;
            }
        }

        /* 模态框样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--bg-primary);
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            padding: 30px;
            box-shadow: var(--shadow);
            transform: translateY(-20px);
            transition: transform 0.3s ease;
            border: 1px solid var(--border-color);
        }

        .modal.show .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-title {
            font-size: 1.5rem;
            color: var(--primary);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }

        .modal-close:hover {
            color: var(--danger);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        /* 隐藏文件输入框 */
        #importFile {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 主题切换按钮 -->
    <button class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
    </button>

    <!-- 移动端悬浮发布按钮 -->
    <button class="fab-button" id="fabButton" style="display: none;">
        <i class="fas fa-plus"></i>
    </button>

    <!-- 通知列表页 -->
    <div class="container" id="listContainer">
        <h1>通知中心</h1>
        
        <!-- 搜索栏 -->
        <div class="search-bar">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="搜索通知标题...">
        </div>

        <!-- 标签筛选栏 -->
        <div class="tag-filter" id="tagFilter">
            <button class="tag-btn active" data-tag="all">全部</button>
            <button class="tag-btn" data-tag="info">信息</button>

    <!-- 提示消息组件 -->
    <div id="toast" class="toast">

        <span id="toastMessage"></span>
    </div>

    <!-- 文件导入隐藏输入框 -->
    <input type="file" id="importFile" accept=".json">

    <script>
        // ======================== 配置区域（仅改这4处） ========================
        const GITHUB_USERNAME = 'sss31444';  // 你的GitHub用户名
        let GITHUB_TOKEN = '';               // 空着，手动输入
        let GIST_ID = 'c2f3ad2d5cb15ede79e04f4f28e3963f';  // 你的GIST ID
        const ADMIN_PASSWORD = 'ideapady450tsixp';  // 你的管理员密码
        // =====================================================================

        let isAdmin = false;
        const gistFilename = 'notifications.json';
        let gistRawUrl = '';
        let allNotifications = []; // 存储所有通知数据
        let currentEditIndex = -1; // 当前编辑的通知索引
        let simplemde = null; // Markdown编辑器实例
        let editSimplemde = null; // 编辑用Markdown编辑器实例
        let currentTagFilter = 'all'; // 当前标签筛选

        // DOM元素
        const notificationsList = document.getElementById('notificationsList');
        const notificationTitle = document.getElementById('notificationTitle');
        const notificationTag = document.getElementById('notificationTag');
        const notificationTop = document.getElementById('notificationTop');
        const notificationContent = document.getElementById('notificationContent');
        const publishBtn = document.getElementById('publishBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const publishForm = document.getElementById('publishForm');
        const batchActions = document.getElementById('batchActions');
        const toast = document.getElementById('toast');
        const toastIcon = document.getElementById('toastIcon');
        const toastMessage = document.getElementById('toastMessage');
        const listContainer = document.getElementById('listContainer');
        const detailContainer = document.getElementById('detailContainer');
        const detailTitle = document.getElementById('detailTitle');
        const detailTimeText = document.getElementById('detailTimeText');
        const detailTag = document.getElementById('detailTag');
        const detailContent = document.getElementById('detailContent');
        const themeToggle = document.getElementById('themeToggle');
        const searchInput = document.getElementById('searchInput');
        const tagFilter = document.getElementById('tagFilter');
        const selectAll = document.getElementById('selectAll');
        const batchDeleteBtn = document.getElementById('batchDeleteBtn');
        const exportBtn = document.getElementById('exportBtn');
        const importBtn = document.getElementById('importBtn');
        const importFile = document.getElementById('importFile');
        const fabButton = document.getElementById('fabButton');
        const editModal = document.getElementById('editModal');
        const editModalClose = document.getElementById('editModalClose');
        const editNotificationTitle = document.getElementById('editNotificationTitle');
        const editNotificationTag = document.getElementById('editNotificationTag');
        const editNotificationTop = document.getElementById('editNotificationTop');
        const editNotificationContent = document.getElementById('editNotificationContent');
        const editCancelBtn = document.getElementById('editCancelBtn');
        const editSaveBtn = document.getElementById('editSaveBtn');
        
        // 页面加载初始化
        document.addEventListener('DOMContentLoaded', async function() {
            // 初始化主题
            initTheme();
            
            // 页面动画
            listContainer.style.opacity = '0';
            listContainer.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                listContainer.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                listContainer.style.opacity = '1';
                listContainer.style.transform = 'translateY(0)';
            }, 100);
            
            // 初始化Markdown编辑器
            initMarkdownEditor();
            
            // 验证管理员
            await checkAdminStatus();
            
            // 加载通知
            await loadNotifications();
            
            // 绑定事件监听
            bindEventListeners();
        });

        // 初始化主题
        function initTheme() {
            // 从本地存储读取主题偏好
            const savedTheme = localStorage.getItem('notificationTheme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
                updateThemeIcon(savedTheme);
            } else if (prefersDark) {
                document.documentElement.setAttribute('data-theme', 'dark');
                updateThemeIcon('dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                updateThemeIcon('light');
            }
        }

        // 更新主题切换按钮图标
        function updateThemeIcon(theme) {
            const icon = themeToggle.querySelector('i');
            if (theme === 'dark') {
                icon.className = 'fas fa-sun';
            } else {
                icon.className = 'fas fa-moon';
            }
        }

        // 初始化Markdown编辑器
        function initMarkdownEditor() {
            // 发布用编辑器
            simplemde = new SimpleMDE({
                element: document.getElementById('notificationContent'),
                spellChecker: false,
                toolbar: [
                    'bold', 'italic', 'heading', '|',
                    'unordered-list', 'ordered-list', '|',
                    'link', 'image', '|',
                    'preview', 'guide'
                ]
            });

            // 编辑用编辑器
            editSimplemde = new SimpleMDE({
                element: document.getElementById('editNotificationContent'),
                spellChecker: false,
                toolbar: [
                    'bold', 'italic', 'heading', '|',
                    'unordered-list', 'ordered-list', '|',
                    'link', 'image', '|',
                    'preview', 'guide'
                ]
            });
        }

        // 绑定所有事件监听
        function bindEventListeners() {
            // 主题切换
            themeToggle.addEventListener('click', toggleTheme);
            
            // 搜索框监听
            searchInput.addEventListener('input', filterNotifications);
            
            // 标签筛选监听
            tagFilter.querySelectorAll('.tag-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    tagFilter.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentTagFilter = this.dataset.tag;
                    filterNotifications();
                });
            });
            
            // 全选复选框
            selectAll.addEventListener('change', toggleSelectAll);
            
            // 批量删除
            batchDeleteBtn.addEventListener('click', batchDeleteNotifications);
            
            // 导出数据
            exportBtn.addEventListener('click', exportNotifications);
            
            // 导入数据
            importBtn.addEventListener('click', () => importFile.click());
            importFile.addEventListener('change', importNotifications);
            
            // 移动端悬浮按钮
            fabButton.addEventListener('click', () => {
                publishForm.scrollIntoView({ behavior: 'smooth' });
            });
            
            // 编辑模态框关闭
            editModalClose.addEventListener('click', closeEditModal);
            editCancelBtn.addEventListener('click', closeEditModal);
            editSaveBtn.addEventListener('click', saveEditNotification);
            
            // 取消发布
            cancelBtn.addEventListener('click', clearPublishForm);
            
            // 发布通知
            publishBtn.addEventListener('click', publishNotification);

            // 点击模态框外部关闭
            editModal.addEventListener('click', function(e) {
                if (e.target === editModal) closeEditModal();
            });
        }

        // 切换主题
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('notificationTheme', newTheme);
            updateThemeIcon(newTheme);
        }

        // 筛选通知（搜索+标签）
        function filterNotifications() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            let filtered = [...allNotifications];
            
            // 标签筛选
            if (currentTagFilter !== 'all') {
                filtered = filtered.filter(notification => notification.tag === currentTagFilter);
            }
            
            // 搜索筛选
            if (searchTerm) {
                filtered = filtered.filter(notification => 
                    notification.title.toLowerCase().includes(searchTerm) ||
                    notification.content.toLowerCase().includes(searchTerm)
                );
            }
            
            // 重新渲染
            renderNotifications(filtered);
        }

        // 全选/取消全选
        function toggleSelectAll() {
            const checkboxes = document.querySelectorAll('.notification-item input[type="checkbox"]');
            checkboxes.forEach(checkbox => {
                checkbox.checked = selectAll.checked;
            });
        }

        // 管理员验证
        function checkAdminStatus() {
            return new Promise((resolve) => {
                // 尝试从本地存储读取Token
                const savedToken = localStorage.getItem('githubGistToken');
                if (savedToken) {
                    const useSaved = confirm('检测到已保存的Token，是否直接使用？');
                    if (useSaved) {
                        GITHUB_TOKEN = atob(savedToken); // 解密
                        isAdmin = true;
                        publishForm.style.display = 'block';
                        batchActions.style.display = 'flex';
                        fabButton.style.display = 'flex';
                        showToast('提示', '已加载保存的Token', 'info');
                        resolve();
                        return;
                    }
                }

                // 强制弹窗输入密码
                const userPassword = prompt("游客无需密码，管理员自行输入密码");
                
                if (userPassword === ADMIN_PASSWORD) {
                    isAdmin = true;
                    // 弹窗要Token
                    GITHUB_TOKEN = prompt("请输入GitHub Gist Token（ghp开头）：");
                    if (GITHUB_TOKEN) {
                        // 询问是否保存Token
                        const saveToken = confirm('是否保存Token以便下次使用？（已加密存储）');
                        if (saveToken) {
                            localStorage.setItem('githubGistToken', btoa(GITHUB_TOKEN)); // 加密存储
                        }
                    } else {
                        showToast('提示', '未输入Token，仅能查看通知', 'info');
                    }
                    // 显示发布表单和批量操作
                    publishForm.style.display = 'block';
                    batchActions.style.display = 'flex';
                    fabButton.style.display = 'flex';
                    showToast('验证成功', '你可以发布/删除/编辑通知', 'success');
                } else {
                    isAdmin = false;
                    // 隐藏发布表单和批量操作
                    publishForm.style.display = 'none';
                    batchActions.style.display = 'none';
                    fabButton.style.display = 'none';
                    showToast('访客模式', '你只能查看通知', 'info');
                }
                resolve();
            });
        }

        // 加载通知
        async function loadNotifications() {
            try {
                // 清空本地数据
                allNotifications = [];
                
                if (GIST_ID) {
                    // 加时间戳+禁用缓存
                    gistRawUrl = `https://gist.githubusercontent.com/${GITHUB_USERNAME}/${GIST_ID}/raw/${gistFilename}?t=${new Date().getTime()}`;
                    const response = await fetch(gistRawUrl, {
                        method: 'GET',
                        headers: { 'Accept': 'application/json' },
                        timeout: 10000,
                        cache: 'no-cache'
                    });

                    if (!response.ok) throw new Error('Gist加载失败');
                    
                    allNotifications = await response.json();
                    // 兼容非数组格式
                    if (!Array.isArray(allNotifications)) allNotifications = [];
                    
                    // 补全缺失的字段
                    allNotifications = allNotifications.map(notification => ({
                        tag: 'info',
                        isTop: false,
                        ...notification
                    }));
                    
                    // 排序：置顶在前，然后按时间倒序
                    allNotifications.sort((a, b) => {
                        if (a.isTop && !b.isTop) return -1;
                        if (!a.isTop && b.isTop) return 1;
                        return new Date(b.time) - new Date(a.time);
                    });
                }
                
                // 过滤并渲染
                filterNotifications();

            } catch (error) {
                console.log('加载通知失败：', error);
                notificationsList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>暂无通知或加载失败</p>
                        ${isAdmin ? '<p style="margin-top:10px;">请发布第一条通知</p>' : ''}
                    </div>
                `;
                showToast('提示', '加载失败，请刷新页面', 'info');
            }
        }

        // 渲染通知列表
        function renderNotifications(notifications) {
            if (!notifications || notifications.length === 0) {
                notificationsList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>暂无通知</p>
                        ${isAdmin ? '<p style="margin-top:10px;">管理员可发布第一条通知</p>' : ''}
                    </div>
                `;
                return;
            }
            
            // 读取已读通知ID
            const readIds = JSON.parse(localStorage.getItem('readNotificationIds') || '[]');
            
            notificationsList.innerHTML = notifications.map((notification, index) => {
                // 生成唯一ID
                const notificationId = `${notification.title}-${notification.time}`;
                const isRead = readIds.includes(notificationId);
                const topClass = notification.isTop ? 'top' : '';
                const unreadClass = isRead ? '' : 'unread';
                
                return `
                    <div class="notification-item ${topClass} ${unreadClass}" onclick="showDetail(${index})">
                        ${isAdmin ? `<input type="checkbox" class="notification-checkbox" data-index="${index}" style="float: left; margin-right: 10px;">` : ''}
                        <div class="notification-header">
                            <div class="notification-title">
                                ${escapeHtml(notification.title)}
                                <span class="notification-tag tag-${notification.tag}">${getTagText(notification.tag)}</span>
                            </div>
                            <div class="notification-time">${formatTime(notification.time)}</div>
                        </div>
                        ${isAdmin ? `
                            <div class="notification-actions">
                                <button class="edit-btn" onclick="event.stopPropagation(); editNotification(${index})">
                                    <i class="fas fa-edit"></i> 编辑
                                </button>
                                <button class="top-btn" onclick="event.stopPropagation(); toggleTop(${index})">
                                    <i class="fas fa-${notification.isTop ? 'thumbtack' : 'circle'}"></i> ${notification.isTop ? '取消置顶' : '置顶'}
                                </button>
                                <button class="delete-btn" onclick="event.stopPropagation(); deleteNotification(${index})">
                                    <i class="fas fa-trash"></i> 删除
                                </button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        // 获取标签文本
        function getTagText(tag) {
            const tags = {
                info: '信息',
                warning: '提醒',
                success: '成功',
                danger: '紧急'
            };
            return tags[tag] || '信息';
        }

        // 显示通知详情
        function showDetail(index) {
            const notification = allNotifications[index];
            if (!notification) return;
            
            // 标记为已读
            const notificationId = `${notification.title}-${notification.time}`;
            let readIds = JSON.parse(localStorage.getItem('readNotificationIds') || '[]');
            if (!readIds.includes(notificationId)) {
                readIds.push(notificationId);
                localStorage.setItem('readNotificationIds', JSON.stringify(readIds));
            }
            
            // 填充详情数据
            detailTitle.textContent = escapeHtml(notification.title);
            detailTimeText.textContent = `发布时间：${formatTime(notification.time)}`;
            detailTag.textContent = getTagText(notification.tag);
            detailTag.className = `detail-tag tag-${notification.tag}`;
            
            // 渲染Markdown内容
            detailContent.innerHTML = marked.parse(notification.content);
            
            // 切换显示状态
            listContainer.style.display = 'none';
            detailContainer.style.display = 'block';
        }

        // 返回通知列表
        function backToList() {
            detailContainer.style.display = 'none';
            listContainer.style.display = 'block';
            // 重置列表动画
            listContainer.style.opacity = '0';
            setTimeout(() => {
                listContainer.style.opacity = '1';
            }, 100);
            // 重新渲染以更新已读状态
            filterNotifications();
        }

        // 清空发布表单
        function clearPublishForm() {
            notificationTitle.value = '';
            notificationTag.value = 'info';
            notificationTop.checked = false;
            simplemde.value('');
        }

        // 发布通知
        async function publishNotification() {
            if (!isAdmin) {
                showToast('权限不足', '只有管理员可以发布通知', 'error');
                return;
            }

            const title = notificationTitle.value.trim();
            const tag = notificationTag.value;
            const isTop = notificationTop.checked;
            const content = simplemde.value().trim();
            
            if (!title) {
                showToast('错误', '通知标题不能为空！', 'error');
                return;
            }
            
            if (!GITHUB_TOKEN) {
                showToast('错误', '请先输入GitHub Token！', 'error');
                return;
            }

            // 组装新通知
            const newNotification = {
                title: title,
                tag: tag,
                isTop: isTop,
                content: content,
                time: new Date().toISOString()
            };

            try {
                let updatedNotifications = [...allNotifications, newNotification];
                
                // 情况1：已有GIST_ID，更新
                if (GIST_ID) {
                    await updateGist(updatedNotifications);
                } 
                // 情况2：无GIST_ID，创建新Gist
                else {
                    const gistData = await createGist(updatedNotifications);
                    GIST_ID = gistData.id;
                    alert(`Gist创建成功，ID：${GIST_ID}\n请复制这个ID填到代码的GIST_ID中！`);
                    showToast('成功', `Gist创建成功，ID：${GIST_ID}`, 'success');
                }

                // 清空表单+重新加载
                clearPublishForm();
                await loadNotifications();
                showToast('成功', '通知发布成功！', 'success');

            } catch (error) {
                showToast('发布失败', '错误：' + error.message, 'error');
                console.log('发布失败：', error);
            }
        }

        // 编辑通知
        function editNotification(index) {
            currentEditIndex = index;
            const notification = allNotifications[index];
            
            // 填充编辑表单
            editNotificationTitle.value = notification.title;
            editNotificationTag.value = notification.tag || 'info';
            editNotificationTop.checked = notification.isTop || false;
            editSimplemde.value(notification.content);
            
            // 显示模态框
            editModal.classList.add('show');
        }

        // 关闭编辑模态框
        function closeEditModal() {
            editModal.classList.remove('show');
            currentEditIndex = -1;
        }

        // 保存编辑的通知
        async function saveEditNotification() {
            if (currentEditIndex === -1 || !isAdmin || !GITHUB_TOKEN) return;
            
            const title = editNotificationTitle.value.trim();
            const tag = editNotificationTag.value;
            const isTop = editNotificationTop.checked;
            const content = editSimplemde.value().trim();
            
            if (!title) {
                showToast('错误', '通知标题不能为空！', 'error');
                return;
            }

            try {
                // 更新通知数据
                allNotifications[currentEditIndex] = {
                    ...allNotifications[currentEditIndex],
                    title: title,
                    tag: tag,
                    isTop: isTop,
                    content: content
                };

                // 更新Gist
                await updateGist(allNotifications);
                
                // 关闭模态框+重新加载
                closeEditModal();
                await loadNotifications();
                showToast('成功', '通知编辑成功！', 'success');

            } catch (error) {
                showToast('编辑失败', '错误：' + error.message, 'error');
                console.log('编辑失败：', error);
            }
        }

        // 切换置顶状态
        async function toggleTop(index) {
            if (!isAdmin || !GITHUB_TOKEN) {
                showToast('权限不足', '只有管理员可以设置置顶', 'error');
                return;
            }

            try {
                // 切换置顶状态
                allNotifications[index].isTop = !allNotifications[index].isTop;
                
                // 更新Gist
                await updateGist(allNotifications);
                
                // 重新加载
                await loadNotifications();
                showToast('成功', `通知已${allNotifications[index].isTop ? '置顶' : '取消置顶'}！`, 'success');

            } catch (error) {
                showToast('操作失败', '错误：' + error.message, 'error');
                console.log('置顶操作失败：', error);
            }
        }

        // 删除单条通知
        async function deleteNotification(index) {
            if (!isAdmin || !GITHUB_TOKEN || !GIST_ID) {
                showToast('权限不足', '请先验证管理员并输入Token', 'error');
                return;
            }
            
            if (confirm('确定要删除这条通知吗？')) {
                try {
                    // 复制数组并删除指定项
                    const updatedNotifications = [...allNotifications];
                    updatedNotifications.splice(index, 1);

                    // 更新Gist
                    await updateGistWithRetry(updatedNotifications);

                    // 强制重新加载
                    allNotifications = [];
                    await loadNotifications();
                    showToast('成功', '通知已删除！', 'success');

                } catch (error) {
                    showToast('删除失败', error.message, 'error');
                    console.error('删除通知详细错误：', error);
                }
            }
        }

        // 批量删除通知
        async function batchDeleteNotifications() {
            if (!isAdmin || !GITHUB_TOKEN || !GIST_ID) {
                showToast('权限不足', '请先验证管理员并输入Token', 'error');
                return;
            }

            // 获取选中的索引
            const checkedBoxes = document.querySelectorAll('.notification-checkbox:checked');
            if (checkedBoxes.length === 0) {
                showToast('提示', '请先选择要删除的通知', 'info');
                return;
            }

            if (!confirm(`确定要删除选中的 ${checkedBoxes.length} 条通知吗？`)) return;

            try {
                // 获取选中的索引并倒序删除
                const indices = Array.from(checkedBoxes)
                    .map(checkbox => parseInt(checkbox.dataset.index))
                    .sort((a, b) => b - a);
                
                // 创建新数组，排除选中的项
                const updatedNotifications = allNotifications.filter((_, index) => 
                    !indices.includes(index)
                );

                // 更新Gist
                await updateGistWithRetry(updatedNotifications);

                // 强制重新加载
                allNotifications = [];
                selectAll.checked = false;
                await loadNotifications();
                showToast('成功', `已删除 ${checkedBoxes.length} 条通知！`, 'success');

            } catch (error) {
                showToast('批量删除失败', error.message, 'error');
                console.error('批量删除详细错误：', error);
            }
        }

        // 导出通知数据
        function exportNotifications() {
            if (allNotifications.length === 0) {
                showToast('提示', '暂无通知数据可导出', 'info');
                return;
            }

            // 创建JSON数据
            const dataStr = JSON.stringify(allNotifications, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            
            // 创建下载链接
            const exportFileDefaultName = `notifications_${new Date().toISOString().slice(0,10)}.json`;
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
            
            showToast('成功', '通知数据已导出！', 'success');
        }

        // 导入通知数据
        function importNotifications(event) {
            if (!isAdmin || !GITHUB_TOKEN) {
                showToast('权限不足', '只有管理员可以导入数据', 'error');
                return;
            }

            const file = event.target.files[0];
            if (!file) return;

            if (file.type !== 'application/json' && !file.name.endsWith('.json')) {
                showToast('错误', '请上传JSON格式的文件', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    
                    if (!Array.isArray(importedData)) {
                        showToast('错误', '导入数据格式错误，必须是数组', 'error');
                        return;
                    }

                    if (!confirm('导入数据将覆盖现有所有通知，确定继续吗？')) return;

                    // 更新Gist
                    await updateGistWithRetry(importedData);
                    
                    // 重新加载
                    allNotifications = [];
                    await loadNotifications();
                    showToast('成功', '通知数据导入成功！', 'success');

                } catch (error) {
                    showToast('导入失败', '错误：' + error.message, 'error');
                    console.error('导入失败详细错误：', error);
                }
            };
            reader.readAsText(file);
            
            // 清空文件输入
            importFile.value = '';
        }

        // 创建新Gist
        async function createGist(notifications) {
            const response = await fetchWithRetry('https://api.github.com/gists', {
                method: 'POST',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json',
                    'User-Agent': 'Mozilla/5.0'
                },
                body: JSON.stringify({
                    description: 'Notifications data for personal page',
                    public: true,
                    files: {
                        [gistFilename]: {
                            content: JSON.stringify(notifications, null, 2)
                        }
                    }
                })
            });

            if (!response.ok) throw new Error(`创建Gist失败：${response.statusText}`);
            return await response.json();
        }

        // 更新现有Gist
        async function updateGist(notifications) {
            const response = await fetchWithRetry(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json',
                    'User-Agent': 'Mozilla/5.0'
                },
                body: JSON.stringify({
                    files: {
                        [gistFilename]: {
                            content: JSON.stringify(notifications, null, 2)
                        }
                    }
                })
            });

            if (!response.ok) throw new Error(`更新Gist失败：${response.statusText}`);
            return await response.json();
        }

        // 带重试的Gist更新
        async function updateGistWithRetry(notifications, retryCount = 3) {
            for (let i = 0; i < retryCount; i++) {
                try {
                    return await updateGist(notifications);
                } catch (error) {
                    if (i === retryCount - 1) throw error;
                    // 等待1秒后重试
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }
            }
        }

        // 带重试的fetch请求
        async function fetchWithRetry(url, options, retryCount = 3) {
            for (let i = 0; i < retryCount; i++) {
                try {
                    const response = await fetch(url, {
                        ...options,
                        timeout: 15000
                    });
                    if (response.ok || i === retryCount - 1) return response;
                } catch (error) {
                    if (i === retryCount - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }
            }
        }

        // 辅助函数：时间格式化
        function formatTime(timeString) {
            const date = new Date(timeString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }
        
        // 辅助函数：HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
        
        // 辅助函数：显示提示
        function showToast(title, message, type) {
            toast.className = 'toast';
            toast.classList.add(`toast-${type}`);
            
            if (type === 'success') {
                toastIcon.className = 'fas fa-check-circle';
            } else if (type === 'error') {
                toastIcon.className = 'fas fa-exclamation-circle';
            } else if (type === 'info') {
                toastIcon.className = 'fas fa-info-circle';
            }
            
            toastMessage.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 扩展：fetch超时处理
        const originalFetch = window.fetch;
        window.fetch = function(resource, options = {}) {
            const timeout = options.timeout || 10000;
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            return originalFetch(resource, {
                ...options,
                signal: controller.signal
            }).finally(() => clearTimeout(id));
        };
